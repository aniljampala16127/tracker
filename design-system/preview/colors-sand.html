<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Sand neutrals</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; background: var(--sand-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; }
  .row { display:grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1.6 / 1; border-radius: 10px; border: 1px solid var(--sand-200); display:flex; flex-direction:column; justify-content:flex-end; padding: 8px 10px; color:#fff; font-size: 11px; font-weight: 600; }
  .sw .hex { font-size: 9.5px; opacity: .8; font-weight: 500; letter-spacing: 0.03em; }
  .sw.light { color: var(--sand-900); }
  h4 { margin: 0 0 8px; font-size: 11px; font-weight: 700; color: var(--sand-500); text-transform: uppercase; letter-spacing: 0.08em; }
  .legend { font-size: 11px; color: var(--sand-500); margin-top: 10px; }
</style></head>
<body>
<div class="wrap">
  <h4>Sand · warm neutrals <span style="color:var(--sand-400); font-weight:500; text-transform:none; letter-spacing:0; margin-left:6px;">page bg, borders, body text — never pure gray</span></h4>
  <div class="row">
    <div class="sw light" style="background:#FAFAF8">50<div class="hex">FAFAF8</div></div>
    <div class="sw light" style="background:#F2F1ED">100<div class="hex">F2F1ED</div></div>
    <div class="sw light" style="background:#E8E6E1">200<div class="hex">E8E6E1</div></div>
    <div class="sw light" style="background:#D5D3CE">300<div class="hex">D5D3CE</div></div>
    <div class="sw light" style="background:#B0ADA6">400<div class="hex">B0ADA6</div></div>
    <div class="sw"       style="background:#8A8880">500<div class="hex">8A8880</div></div>
    <div class="sw"       style="background:#65635D">600<div class="hex">65635D</div></div>
    <div class="sw"       style="background:#43423E">700<div class="hex">43423E</div></div>
    <div class="sw"       style="background:#2B2A27">800<div class="hex">2B2A27</div></div>
    <div class="sw"       style="background:#1A1A18">900<div class="hex">1A1A18</div></div>
  </div>
  <div class="legend">sand-50 page bg · sand-200 every card border · sand-500 muted body · sand-900 headings.</div>
</div>
</body></html>
