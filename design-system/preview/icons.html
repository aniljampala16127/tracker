<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Icon set</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; background: var(--sand-50); font-family: var(--font-sans); }
  .wrap { padding: 14px 18px; }
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap: 8px; }
  .cell { background:#fff; border:1px solid var(--sand-200); border-radius: 10px; padding: 8px 6px 6px; display:flex; flex-direction:column; align-items:center; gap: 4px; color: var(--sand-500); }
  .lbl { font-size: 9px; color: var(--sand-500); text-align: center; line-height: 1.1; }
  .head { font-size: 10px; font-weight: 700; color: var(--sand-500); text-transform: uppercase; letter-spacing: 0.08em; margin: 0 0 6px; }
  .note { font-size: 11px; color: var(--sand-500); margin-top: 6px; }
</style></head>
<body>
<div class="wrap">
  <div class="head">Bespoke SVG set · 1.8 stroke · currentColor · round caps</div>
  <div class="grid">

    <div class="cell"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2V6"/><path d="M8 2V6"/><path d="M3 10H21"/></svg><div class="lbl">Calendar</div></div>

  </div>
</div>
</body></html>
