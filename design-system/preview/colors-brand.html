<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Brand color scale</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; background: var(--sand-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; }
  .row { display:grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
  .sw { aspect-ratio: 1.6 / 1; border-radius: 10px; border: 1px solid var(--sand-200); display:flex; flex-direction:column; justify-content:flex-end; padding: 8px 10px; color:#fff; font-size: 11px; font-weight: 600; }
  .sw .hex { font-size: 9.5px; opacity: .8; font-weight: 500; letter-spacing: 0.03em; }
  .sw.light { color: var(--sand-900); }
  h4 { margin: 0 0 8px; font-size: 11px; font-weight: 700; color: var(--sand-500); text-transform: uppercase; letter-spacing: 0.08em; }
  .legend { font-size: 11px; color: var(--sand-500); margin-top: 10px; }
</style></head>
<body>
<div class="wrap">
  <h4>Brand green · primary <span style="color:var(--sand-400); font-weight:500; text-transform:none; letter-spacing:0; margin-left:6px;">workhorse — buttons, links, "you" highlight, active nav</span></h4>
  <div class="row">
    <div class="sw light" style="background:#F0F7F2">50<div class="hex">F0F7F2</div></div>
    <div class="sw light" style="background:#D4E8DC">100<div class="hex">D4E8DC</div></div>
    <div class="sw light" style="background:#A8D1B8">200<div class="hex">A8D1B8</div></div>
    <div class="sw"       style="background:#74B08A">300<div class="hex">74B08A</div></div>
    <div class="sw"       style="background:#4A9468">400<div class="hex">4A9468</div></div>
    <div class="sw"       style="background:#2D6A4F; box-shadow: 0 0 0 2px #2D6A4F, 0 0 0 4px rgba(45,106,79,0.20);">500<div class="hex">2D6A4F</div></div>
    <div class="sw"       style="background:#245740">600<div class="hex">245740</div></div>
    <div class="sw"       style="background:#1B4331">700<div class="hex">1B4331</div></div>
    <div class="sw"       style="background:#133022">800<div class="hex">133022</div></div>
    <div class="sw"       style="background:#0A1D14">900<div class="hex">0A1D14</div></div>
  </div>
  <div class="legend">brand-500 (ringed) is the primary. -100 for tinted backgrounds, -600/-700 for hover/active states.</div>
</div>
</body></html>
