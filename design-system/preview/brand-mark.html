<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Brand mark — SponsorTrack</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; background: var(--sand-50); }
  .card { padding: 24px 28px; display:flex; align-items:center; gap: 28px; }
  .mark { width: 84px; height: 84px; border-radius: 16px; box-shadow: var(--shadow-md); }
  .right { display:flex; flex-direction:column; gap: 6px; }
  .wordmark { font-family: var(--font-sans); font-weight: 700; font-size: 28px; color: var(--sand-900); letter-spacing: -0.02em; }
  .meta { font-size: 12px; color: var(--sand-500); display:flex; gap:14px; }
  .swatch { display:inline-flex; align-items:center; gap:6px; }
  .dot { width:10px; height:10px; border-radius:50%; }
</style></head>
<body>
<div class="card">
  <img class="mark" src="../assets/sponsortrack-icon.svg" alt="SponsorTrack" />
  <div class="right">
    <div class="wordmark">SponsorTrack</div>
    <div class="caption" style="color: var(--sand-500); font-size: 13px;">Free community tracker for Canadian spousal sponsorship</div>
    <div class="meta">
      <span class="swatch"><span class="dot" style="background:#2D6A4F"></span>Brand 500 · #2D6A4F</span>
      <span class="swatch"><span class="dot" style="background:#D4A03C"></span>Warn · #D4A03C</span>
    </div>
  </div>
</div>
</body></html>
