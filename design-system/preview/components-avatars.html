<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Avatars</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; background: var(--sand-50); font-family: var(--font-sans); }
  .wrap { padding: 16px 22px; display:flex; gap: 24px; align-items:center; flex-wrap: wrap; }
  .group { display:flex; flex-direction:column; gap: 6px; align-items:center; }
  .label { font-size: 10px; color: var(--sand-500); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
  .av { border-radius: 50%; background: var(--brand-100); color: var(--brand-600); font-weight: 700; display:flex; align-items:center; justify-content:center; }
  .av-sm { width: 32px; height: 32px; font-size: 12px; }
  .av-md { width: 40px; height: 40px; font-size: 14px; }
  .av-lg { width: 48px; height: 48px; font-size: 16px; }
  .av-square { border-radius: 12px; background: var(--brand-500); color: #fff; width: 48px; height: 48px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size: 14px; }
  .row { display:flex; gap: 6px; }
</style></head>
