<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Type — display</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; background: var(--sand-50); }
  .wrap { padding: 20px 24px; display:flex; flex-direction:column; gap: 6px; font-family: var(--font-sans); }
  .row { display:flex; align-items:baseline; gap: 16px; }
  .meta { font-size: 10px; color: var(--sand-400); font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; min-width: 130px; }
  .h1 { font-size: 36px; font-weight: 700; letter-spacing: -0.02em; color: var(--sand-900); line-height: 1.05; }
  .accent { color: var(--brand-600); }
  .h2 { font-size: 20px; font-weight: 700; color: var(--sand-900); letter-spacing: -0.01em; }
  .stat { font-size: 24px; font-weight: 700; color: var(--sand-900); letter-spacing: -0.02em; }
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="meta">H1 · 36/700 / -0.02em</span><span class="h1">Track your Canada<br/><span class="accent">spousal sponsorship</span></span></div>
  <div class="row" style="margin-top:14px;"><span class="meta">H2 · 20/700</span><span class="h2">Recent milestones</span></div>
  <div class="row"><span class="meta">Stat · 24/700</span><span class="stat">87<span style="font-size:14px; color:var(--sand-500); font-weight:500;">d avg AOR</span></span></div>
</div>
</body></html>
