<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Semantic accents</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; background: var(--sand-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .group { background: #fff; border: 1px solid var(--sand-200); border-radius: 12px; padding: 12px 14px; }
  .label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--sand-500); margin-bottom: 8px; }
  .pair { display:flex; gap: 6px; }
  .ch { flex:1; height: 56px; border-radius: 8px; display:flex; flex-direction:column; justify-content:flex-end; padding: 6px 8px; font-size: 10px; font-weight: 600; }
  .h { font-size: 9.5px; opacity: .85; font-weight: 500; }
  .use { font-size: 11px; color: var(--sand-500); margin-top: 8px; }
</style></head>
<body>
<div class="wrap">
  <div class="group">
    <div class="label">Warn — gold</div>
    <div class="pair">
      <div class="ch" style="background:#FDF3DC; color:#9B7420">light<div class="h">FDF3DC</div></div>
      <div class="ch" style="background:#D4A03C; color:#fff">warn<div class="h">D4A03C</div></div>
      <div class="ch" style="background:#9B7420; color:#fff">dark<div class="h">9B7420</div></div>
    </div>
    <div class="use">Outland stream badge, warnings, hero corner glow. Never primary actions.</div>
  </div>
  <div class="group">
    <div class="label">Error — terracotta</div>
    <div class="pair">
      <div class="ch" style="background:#FCEAE7; color:#8B3D30">light<div class="h">FCEAE7</div></div>
      <div class="ch" style="background:#C05746; color:#fff">error<div class="h">C05746</div></div>
      <div class="ch" style="background:#8B3D30; color:#fff">dark<div class="h">8B3D30</div></div>
    </div>
    <div class="use">Destructive only. Delete, PIN-error shake, unread count badge.</div>
  </div>
</div>
</body></html>
