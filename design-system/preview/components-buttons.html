<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; background: var(--sand-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; display:flex; flex-direction:column; gap: 14px; }
  .row { display:flex; align-items:center; gap: 10px; flex-wrap: wrap; }
  button { font-family: inherit; cursor: pointer; border: none; display:inline-flex; align-items:center; gap: 8px; font-weight: 500; transition: all 150ms; }
  .btn-primary { background: var(--brand-500); color: #fff; padding: 8px 16px; font-size: 14px; border-radius: 8px; font-weight: 600; }
  .btn-primary.lg { padding: 12px 24px; box-shadow: 0 8px 24px rgba(45,106,79,0.20); border-radius: 12px; }
  .btn-secondary { background: #fff; color: var(--sand-900); border: 1px solid var(--sand-200); padding: 8px 16px; font-size: 14px; border-radius: 8px; }
  .btn-danger { background: #fff; color: var(--error); border: 1px solid rgba(192,87,70,0.30); padding: 8px 16px; font-size: 14px; border-radius: 8px; }
  .btn-ghost { background: transparent; color: var(--sand-500); padding: 6px 12px; font-size: 13px; border-radius: 8px; }
  .btn-sm { font-size: 12px; padding: 6px 12px; }
  .meta { font-size: 10px; font-weight: 700; color: var(--sand-400); text-transform: uppercase; letter-spacing: 0.08em; min-width: 110px; }
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="meta">Primary</span><button class="btn-primary">Add application</button><button class="btn-primary lg">Add Your Application</button><button class="btn-primary btn-sm">Save</button></div>
  <div class="row"><span class="meta">Secondary</span><button class="btn-secondary">Cancel</button><button class="btn-secondary">View details →</button></div>
  <div class="row"><span class="meta">Danger / Ghost</span><button class="btn-danger">Delete entry</button><button class="btn-ghost">Skip for now</button></div>
</div>
</body></html>
