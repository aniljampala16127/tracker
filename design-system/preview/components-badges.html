<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Badges + pills</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; background: var(--sand-50); font-family: var(--font-sans); }
  .wrap { padding: 18px 22px; display:flex; flex-direction:column; gap: 12px; }
  .row { display:flex; align-items:center; gap: 8px; flex-wrap: wrap; }
  .meta { font-size: 10px; font-weight: 700; color: var(--sand-400); text-transform: uppercase; letter-spacing: 0.08em; min-width: 110px; }
  .badge { display:inline-block; padding: 2px 8px; font-size: 12px; font-weight: 600; border-radius: 6px; }
  .b-default { background: var(--sand-100); color: var(--sand-600); }
  .b-success { background: var(--brand-100); color: var(--brand-600); }
  .b-warn { background: var(--warn-light); color: var(--warn-dark); }
  .b-error { background: var(--error-light); color: var(--error-dark); }
  .pill { display:inline-flex; align-items:center; gap: 6px; padding: 4px 12px; font-size: 11px; font-weight: 600; border-radius: 9999px; background: var(--brand-100); color: var(--brand-700); }
  .pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--brand-500); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:.4;} }
  .stream { display:inline-block; padding: 2px 7px; border-radius: 9999px; font-size: 9px; font-weight: 700; }
  .you { background: var(--brand-100); color: var(--brand-700); }
  .inland { background: var(--brand-100); color: var(--brand-700); }
  .outland { background: rgba(212,160,60,0.10); color: var(--warn); }
</style></head>
<body>
<div class="wrap">
  <div class="row"><span class="meta">Badges</span>
    <span class="badge b-default">Pending</span>
    <span class="badge b-success">AOR</span>
    <span class="badge b-warn">Outland</span>
    <span class="badge b-error">Refused</span>
  </div>
  <div class="row"><span class="meta">Live pill</span>
    <span class="pill"><span class="pulse"></span>300 applications tracking live</span>
  </div>
  <div class="row"><span class="meta">Stream / "you"</span>
    <span class="stream you">YOU</span>
    <span class="stream inland">Inland</span>
    <span class="stream outland">Outland</span>
  </div>
</div>
</body></html>
