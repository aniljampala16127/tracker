<!doctype html>
<html lang="en"><head><meta charset="utf-8" />
<title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  html, body { margin:0; background: var(--sand-50); font-family: var(--font-sans); }
  .wrap { padding: 16px 22px; }
  h4 { margin: 0 0 10px; font-size: 10px; font-weight: 700; color: var(--sand-500); text-transform: uppercase; letter-spacing: 0.08em; }
  .row { display:flex; align-items:center; gap: 12px; }
  .item { display:flex; flex-direction:column; align-items:center; gap: 4px; }
  .bar { background: var(--brand-200); height: 14px; border-radius: 3px; }
  .lbl { font-size: 10px; color: var(--sand-500); font-weight: 600; }
  .note { font-size: 11px; color: var(--sand-500); margin-top: 12px; }
</style></head>
<body>
<div class="wrap">
  <h4>Spacing — 4-pt grid</h4>
  <div class="row">
    <div class="item"><div class="bar" style="width:4px"></div><div class="lbl">4</div></div>
    <div class="item"><div class="bar" style="width:8px"></div><div class="lbl">8</div></div>
    <div class="item"><div class="bar" style="width:12px"></div><div class="lbl">12</div></div>
    <div class="item"><div class="bar" style="width:16px"></div><div class="lbl">16</div></div>
    <div class="item"><div class="bar" style="width:20px"></div><div class="lbl">20</div></div>
    <div class="item"><div class="bar" style="width:24px"></div><div class="lbl">24</div></div>
    <div class="item"><div class="bar" style="width:32px"></div><div class="lbl">32</div></div>
    <div class="item"><div class="bar" style="width:40px"></div><div class="lbl">40</div></div>
    <div class="item"><div class="bar" style="width:48px"></div><div class="lbl">48</div></div>
  </div>
  <p class="note">Cards p-4 / p-5 (16–20). Card gap 12. Section gap 24–32. Hero p-12 vertically.</p>
</div>
</body></html>
